apiVersion: v1
kind: Pod
metadata:
  name: app-with-sidecar
  labels:
    pattern: sidecar
spec:
  containers:
  # 메인 애플리케이션 컨테이너
  - name: app
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: logs
      mountPath: /var/log/nginx

  # Sidecar 컨테이너: 로그 수집
  - name: log-collector
    image: busybox:1.36
    command: ['sh', '-c', 'tail -F /logs/access.log 2>/dev/null || tail -F /logs/error.log 2>/dev/null || sleep infinity']
    volumeMounts:
    - name: logs
      mountPath: /logs

  # 공유 볼륨
  volumes:
  - name: logs
    emptyDir: {}
