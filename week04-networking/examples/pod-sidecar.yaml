apiVersion: v1
kind: Pod
metadata:
  name: sidecar-pod
  labels:
    pattern: sidecar
spec:
  containers:
  # 메인 컨테이너: nginx 웹 서버
  - name: web
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: html
      mountPath: /usr/share/nginx/html

  # 사이드카 컨테이너: 5초마다 웹 페이지 업데이트
  - name: content-updater
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do date > /html/index.html; echo "Pod: $HOSTNAME" >> /html/index.html; sleep 5; done']
    volumeMounts:
    - name: html
      mountPath: /html

  # 두 컨테이너가 공유하는 디렉토리 (5주차에서 자세히 학습)
  volumes:
  - name: html
    emptyDir: {}
