apiVersion: v1
kind: Pod
metadata:
  name: app-with-adapter
  labels:
    pattern: adapter
spec:
  containers:
  # 메인 애플리케이션 - 로그를 파일에 기록
  - name: app
    image: busybox:1.36
    command: ['sh', '-c', 'while true; do echo "$(date) - Request processed" >> /app/logs/app.log; sleep 5; done']
    volumeMounts:
    - name: logs
      mountPath: /app/logs

  # Adapter 컨테이너: 로그 형식을 변환하여 표준 출력으로 전송
  - name: log-adapter
    image: busybox:1.36
    command: ['sh', '-c', 'tail -F /input/app.log | while read line; do echo "[ADAPTED] $line"; done']
    volumeMounts:
    - name: logs
      mountPath: /input

  # 공유 볼륨
  volumes:
  - name: logs
    emptyDir: {}
