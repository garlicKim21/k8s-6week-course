apiVersion: v1
kind: Pod
metadata:
  name: pod-configmap-volume
spec:
  containers:
  - name: app
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config
      readOnly: true
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
      readOnly: true

  volumes:
  # 전체 ConfigMap 마운트
  - name: config-volume
    configMap:
      name: app-config

  # 특정 키만 마운트 (파일명 변경 가능)
  - name: nginx-config
    configMap:
      name: app-config
      items:
      - key: nginx.conf
        path: default.conf  # 파일명을 default.conf로 변경
