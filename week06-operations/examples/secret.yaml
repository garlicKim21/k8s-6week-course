apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  # stringData를 사용하면 평문으로 작성 가능 (자동 Base64 인코딩)
  username: admin
  password: SecurePassword123!
  connection-string: "mysql://admin:SecurePassword123!@mysql:3306/mydb"

