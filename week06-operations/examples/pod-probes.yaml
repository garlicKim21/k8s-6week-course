apiVersion: v1
kind: Pod
metadata:
  name: probe-demo
spec:
  containers:
  - name: app
    image: nginx:1.27
    ports:
    - containerPort: 80

    # Startup Probe: 앱 시작 완료 확인
    # 성공 전까지 liveness/readiness probe 비활성화
    startupProbe:
      httpGet:
        path: /
        port: 80
      failureThreshold: 30   # 최대 30번 시도
      periodSeconds: 10      # 10초 간격 (총 5분 대기)

    # Liveness Probe: 컨테이너 생존 확인
    # 실패 시 컨테이너 재시작
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 0   # startup probe 성공 후 즉시 시작
      periodSeconds: 10        # 10초마다 체크
      timeoutSeconds: 1        # 응답 타임아웃
      failureThreshold: 3      # 3번 연속 실패 시 재시작

    # Readiness Probe: 트래픽 수신 준비 확인
    # 실패 시 Service endpoints에서 제외
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 1
      successThreshold: 1      # 1번 성공 시 Ready
      failureThreshold: 3      # 3번 실패 시 Not Ready

    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
