apiVersion: v1
kind: Pod
metadata:
  name: local-path-pod
spec:
  containers:
  - name: app
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: local-storage
      mountPath: /usr/share/nginx/html

  volumes:
  - name: local-storage
    persistentVolumeClaim:
      claimName: local-path-pvc
