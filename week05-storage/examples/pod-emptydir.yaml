apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
spec:
  containers:
  # 데이터를 쓰는 컨테이너
  - name: writer
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Hello from writer!" > /data/hello.txt && sleep 3600']
    volumeMounts:
    - name: shared-data
      mountPath: /data

  # 데이터를 읽는 컨테이너
  - name: reader
    image: busybox:1.36
    command: ['sh', '-c', 'sleep 2 && cat /data/hello.txt && sleep 3600']
    volumeMounts:
    - name: shared-data
      mountPath: /data

  volumes:
  - name: shared-data
    emptyDir: {}  # Pod 시작 시 빈 디렉토리 생성
