apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
spec:
  containers:
  # busybox가 시작 시 index.html을 생성하고 대기
  - name: content-creator
    image: busybox:1.36
    command: ['sh', '-c', 'echo "<h1>Hello from emptyDir!</h1><p>This page was generated by busybox container.</p>" > /usr/share/nginx/html/index.html && sleep 3600']
    volumeMounts:
    - name: shared-data
      mountPath: /usr/share/nginx/html

  # nginx가 같은 볼륨의 웹 페이지를 서빙
  - name: web
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: shared-data
      mountPath: /usr/share/nginx/html

  volumes:
  - name: shared-data
    emptyDir: {}  # Pod 시작 시 빈 디렉토리 생성
