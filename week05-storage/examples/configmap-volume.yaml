# ConfigMapмқ„ ліјлҘЁмңјлЎң л§ҲмҡҙнҠён•ҳлҠ” мҳҲм ң

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  app.properties: |
    database.host=localhost
    database.port=5432
    cache.enabled=true
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

---
apiVersion: v1
kind: Pod
metadata:
  name: config-volume-pod
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ['sh', '-c', 'cat /etc/config/app.properties && sleep 3600']
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config

  volumes:
  - name: config-volume
    configMap:
      name: app-config
      # нҠ№м • нӮӨл§Ң л§ҲмҡҙнҠён•  мҲҳлҸ„ мһҲмқҢ
