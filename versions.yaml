# Kubernetes 교육 과정 버전 정보
# 이 파일을 수정하면 pre-commit hook이 자동으로 모든 문서를 업데이트합니다.
#
# 사용법:
#   1. 이 파일의 버전 정보 수정
#   2. git add versions.yaml
#   3. git commit → 자동으로 모든 파일 업데이트
#
# 수동 실행:
#   python3 scripts/update-versions.py

# 핵심 컴포넌트 버전
kubernetes: "1.35"
containerd: "2.2.1"
cilium: "1.18.6"
minikube: "1.37.0"

# 운영체제
ubuntu: "24.04"

# 컨테이너 이미지
nginx: "1.27"
mysql: "8.0"
busybox: "1.36"
redis: "7"

# 추가 도구
runc: "1.4.0"
cni_plugins: "1.9.0"

# 메타 정보 (문서용)
kubernetes_codename: "Timbernetes"
kubernetes_release_date: "2025.12"
